<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Story</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=IM+Fell+English&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="scene">

        <!-- Mountain silhouette layers -->
        <div class="mountains mountains-far"></div>
        <div class="mountains mountains-near"></div>

        <!-- Floating ember particles -->
        <div class="embers">
            <div class="ember"></div>
            <div class="ember"></div>
            <div class="ember"></div>
            <div class="ember"></div>
            <div class="ember"></div>
            <div class="ember"></div>
            <div class="ember"></div>
            <div class="ember"></div>
            <div class="ember"></div>
            <div class="ember"></div>
            <div class="ember"></div>
            <div class="ember"></div>
        </div>

        <!-- Title -->
        <h1 class="title">Our Story</h1>

        <!-- Dragon scene row -->
        <div class="dragon-scene">

            <!-- ══ TOOTHLESS (Night Fury) — left, facing right ══ -->
            <svg class="dragon toothless" viewBox="0 0 250 285"
                 xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Toothless the Night Fury dragon">
                <defs>
                    <filter id="t-eye-glow" x="-80%" y="-80%" width="260%" height="260%">
                        <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="blur"/>
                        <feMerge>
                            <feMergeNode in="blur"/>
                            <feMergeNode in="SourceGraphic"/>
                        </feMerge>
                    </filter>
                    <filter id="t-fire" x="-100%" y="-100%" width="300%" height="300%">
                        <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
                        <feMerge>
                            <feMergeNode in="blur"/>
                            <feMergeNode in="SourceGraphic"/>
                        </feMerge>
                    </filter>
                </defs>

                <!-- Upper wing (behind body) -->
                <g class="wing wing-upper-left">
                    <path d="M 68,155 C 28,98 10,44 44,14 C 54,54 64,104 84,152" fill="#0d0d1c"/>
                    <path d="M 68,155 C 36,106 20,58 44,14 C 48,40 56,90 82,150" fill="#1a1a30" opacity="0.9"/>
                    <line x1="44" y1="14" x2="70" y2="153" stroke="#24243e" stroke-width="1.5" opacity="0.6"/>
                    <line x1="30" y1="48" x2="72" y2="154" stroke="#24243e" stroke-width="1" opacity="0.5"/>
                    <path d="M 44,14 C 26,4 14,12 22,28" fill="none" stroke="#0d0d1c" stroke-width="5" stroke-linecap="round"/>
                    <path d="M 44,14 C 28,-4 16,2 20,20" fill="none" stroke="#0d0d1c" stroke-width="4" stroke-linecap="round"/>
                </g>

                <!-- Lower wing (behind body) -->
                <g class="wing wing-lower-left">
                    <path d="M 55,208 C 8,218 -8,246 18,270 C 36,252 50,232 68,214" fill="#0d0d1c"/>
                    <path d="M 55,208 C 18,220 6,244 18,270 C 32,252 46,232 66,213" fill="#1a1a30" opacity="0.9"/>
                </g>

                <!-- Body -->
                <ellipse cx="93" cy="188" rx="60" ry="50" fill="#0d0d1c"/>

                <!-- Neck -->
                <ellipse cx="130" cy="158" rx="32" ry="24" fill="#0d0d1c" transform="rotate(-15,130,158)"/>

                <!-- Head (large, round — Toothless's signature look) -->
                <circle cx="168" cy="118" r="44" fill="#0d0d1c"/>

                <!-- Ear fins -->
                <path d="M 140,82 C 124,50 132,26 144,42 C 141,56 140,70 140,82" fill="#0d0d1c"/>
                <path d="M 168,80 C 160,48 166,24 178,38 C 174,53 171,67 168,80" fill="#0d0d1c"/>

                <!-- Snout/jaw lower jaw slight jut -->
                <ellipse cx="205" cy="130" rx="12" ry="8" fill="#0d0d1c"/>

                <!-- Eyes — big, bright green, most iconic Toothless feature -->
                <circle cx="152" cy="113" r="17" fill="#00d870" filter="url(#t-eye-glow)"/>
                <circle cx="180" cy="111" r="17" fill="#00d870" filter="url(#t-eye-glow)"/>
                <!-- Pupils (vertical slit) -->
                <ellipse cx="153" cy="114" rx="8" ry="13" fill="#001408"/>
                <ellipse cx="181" cy="112" rx="8" ry="13" fill="#001408"/>
                <!-- Eye shine -->
                <circle cx="148" cy="108" r="5" fill="white" opacity="0.8"/>
                <circle cx="176" cy="106" r="5" fill="white" opacity="0.8"/>

                <!-- Left arm tucked -->
                <path d="M 136,204 C 126,218 118,226 115,236" fill="none" stroke="#0d0d1c" stroke-width="10" stroke-linecap="round"/>

                <!-- Right arm extending right toward rope -->
                <path d="M 184,162 C 200,172 216,178 232,175" fill="none" stroke="#0d0d1c" stroke-width="12" stroke-linecap="round"/>
                <!-- Claw fingers -->
                <path d="M 232,175 C 240,166 244,160 241,170" fill="none" stroke="#0d0d1c" stroke-width="5" stroke-linecap="round"/>
                <path d="M 232,175 C 235,185 237,190 241,186" fill="none" stroke="#0d0d1c" stroke-width="5" stroke-linecap="round"/>
                <path d="M 232,175 C 228,185 228,191 233,190" fill="none" stroke="#0d0d1c" stroke-width="5" stroke-linecap="round"/>

                <!-- Tail -->
                <path d="M 36,206 Q 8,224 2,256" fill="none" stroke="#0d0d1c" stroke-width="14" stroke-linecap="round"/>
                <!-- Twin tail fins (Night Fury) -->
                <path d="M 2,256 C -10,270 -6,280 4,266 C 12,276 16,284 6,264" fill="#0d0d1c"/>

                <!-- Subtle fire breath glow from mouth area -->
                <ellipse cx="214" cy="122" rx="22" ry="12" fill="#ff9820" class="fire-glow" filter="url(#t-fire)"/>
            </svg>

            <!-- ══ CENTER: rope + banner ══ -->
            <div class="banner-section">
                <!-- Decorative rope spanning banner section width -->
                <svg class="rope" viewBox="0 0 360 52" preserveAspectRatio="none"
                     xmlns="http://www.w3.org/2000/svg">
                    <path d="M 0,6 C 70,6 90,46 180,48 C 270,46 290,6 360,6"
                          stroke="#6e4e14" stroke-width="4" fill="none" stroke-linecap="round"/>
                    <path d="M 0,6 C 70,6 90,46 180,48 C 270,46 290,6 360,6"
                          stroke="#a07828" stroke-width="2" fill="none"
                          stroke-dasharray="5,7" stroke-linecap="round" opacity="0.5"/>
                </svg>

                <!-- Wooden hanging banner -->
                <div class="banner">
                    <div class="banner-nails">
                        <div class="nail"></div>
                        <div class="nail"></div>
                    </div>
                    <p class="banner-label">✦ Enter Our Secret ✦</p>
                    <form id="passwordForm" class="password-form" novalidate>
                        <input
                            type="password"
                            id="passwordInput"
                            class="password-input"
                            placeholder="enter password..."
                            autocomplete="off"
                            required
                            aria-label="Password"
                        >
                        <button type="submit" class="password-button">Enter ✦</button>
                        <div id="errorMessage" class="error-message" role="alert" aria-live="polite"></div>
                    </form>
                </div>
            </div>

            <!-- ══ LIGHT FURY — right, facing left ══ -->
            <svg class="dragon light-fury" viewBox="0 0 250 285"
                 xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Light Fury dragon">
                <defs>
                    <filter id="lf-eye-glow" x="-80%" y="-80%" width="260%" height="260%">
                        <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
                        <feMerge>
                            <feMergeNode in="blur"/>
                            <feMergeNode in="SourceGraphic"/>
                        </feMerge>
                    </filter>
                    <filter id="lf-body-glow" x="-60%" y="-60%" width="220%" height="220%">
                        <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
                        <feMerge>
                            <feMergeNode in="blur"/>
                            <feMergeNode in="SourceGraphic"/>
                        </feMerge>
                    </filter>
                </defs>

                <!-- Soft bioluminescent body halo -->
                <ellipse cx="148" cy="185" rx="90" ry="75" fill="#88ccff" opacity="0.07" filter="url(#lf-body-glow)"/>

                <!-- Upper wing (behind body) -->
                <g class="wing wing-upper-right">
                    <path d="M 182,155 C 222,98 240,44 206,14 C 196,54 186,104 166,152" fill="#cce6f8"/>
                    <path d="M 182,155 C 214,106 230,58 206,14 C 202,40 194,90 168,150" fill="#dff0fa" opacity="0.9"/>
                    <!-- Bioluminescent vein lines -->
                    <line x1="206" y1="14" x2="180" y2="153" stroke="#50b8f0" stroke-width="1.5" opacity="0.65" class="bio-line"/>
                    <line x1="220" y1="48" x2="178" y2="154" stroke="#50b8f0" stroke-width="1" opacity="0.55" class="bio-line"/>
                    <!-- Wing tip fingers (more elegant/slender than Toothless) -->
                    <path d="M 206,14 C 224,4 236,12 228,28" fill="none" stroke="#cce6f8" stroke-width="4" stroke-linecap="round"/>
                    <path d="M 206,14 C 222,-4 234,2 230,20" fill="none" stroke="#cce6f8" stroke-width="3.5" stroke-linecap="round"/>
                </g>

                <!-- Lower wing (behind body) -->
                <g class="wing wing-lower-right">
                    <path d="M 192,208 C 240,218 258,246 232,270 C 214,252 200,232 182,214" fill="#cce6f8"/>
                    <path d="M 192,208 C 232,220 244,244 232,270 C 218,252 204,232 184,213" fill="#dff0fa" opacity="0.9"/>
                </g>

                <!-- Body (sleeker/more streamlined) -->
                <ellipse cx="155" cy="188" rx="58" ry="48" fill="#d8eef8"/>

                <!-- Neck -->
                <ellipse cx="118" cy="158" rx="30" ry="22" fill="#d8eef8" transform="rotate(15,118,158)"/>

                <!-- Head (sleeker than Toothless, slightly more pointed) -->
                <circle cx="82" cy="118" r="40" fill="#d8eef8"/>
                <!-- Slightly pointed snout -->
                <path d="M 48,130 C 36,124 28,118 33,112 C 42,112 50,116 58,122 Z" fill="#cce6f4"/>

                <!-- Head crests/fins (Light Fury has prominent dorsal fins) -->
                <path d="M 98,82 C 108,52 102,28 92,44 C 95,57 97,70 98,82" fill="#cce6f4"/>
                <path d="M 75,80 C 66,50 70,26 82,40 C 79,54 77,67 75,80" fill="#cce6f4"/>

                <!-- Eyes (icy blue) -->
                <circle cx="94" cy="113" r="15" fill="#90d0ff" filter="url(#lf-eye-glow)"/>
                <circle cx="66" cy="116" r="15" fill="#90d0ff" filter="url(#lf-eye-glow)"/>
                <!-- Pupils -->
                <ellipse cx="93" cy="114" rx="7" ry="11" fill="#00101e"/>
                <ellipse cx="65" cy="117" rx="7" ry="11" fill="#00101e"/>
                <!-- Eye shine -->
                <circle cx="89" cy="109" r="4" fill="white" opacity="0.85"/>
                <circle cx="61" cy="112" r="4" fill="white" opacity="0.85"/>

                <!-- Right arm tucked -->
                <path d="M 120,204 C 130,218 138,226 142,236" fill="none" stroke="#cce6f4" stroke-width="9" stroke-linecap="round"/>

                <!-- Left arm extending left toward rope -->
                <path d="M 64,164 C 48,174 32,180 16,176" fill="none" stroke="#d0e8f4" stroke-width="11" stroke-linecap="round"/>
                <!-- Claw fingers -->
                <path d="M 16,176 C 8,167 4,161 7,171" fill="none" stroke="#c0dcea" stroke-width="5" stroke-linecap="round"/>
                <path d="M 16,176 C 14,186 12,191 8,187" fill="none" stroke="#c0dcea" stroke-width="5" stroke-linecap="round"/>
                <path d="M 16,176 C 20,186 20,192 15,191" fill="none" stroke="#c0dcea" stroke-width="5" stroke-linecap="round"/>

                <!-- Tail (elegant, more slender) -->
                <path d="M 210,206 Q 238,224 244,256" fill="none" stroke="#cce6f4" stroke-width="12" stroke-linecap="round"/>
                <!-- Forked tail fins (Light Fury signature) -->
                <path d="M 244,256 C 254,270 250,280 242,266 C 252,274 256,282 248,264" fill="#cce6f4"/>

                <!-- Bioluminescent body markings -->
                <path d="M 148,158 C 142,172 134,184 128,198" stroke="#58c4ff" stroke-width="2" fill="none" opacity="0.55" class="bio-line"/>
                <path d="M 162,170 C 156,186 150,202 146,216" stroke="#58c4ff" stroke-width="1.5" fill="none" opacity="0.45" class="bio-line"/>
            </svg>

        </div><!-- /dragon-scene -->
    </div><!-- /scene -->

    <script src="script.js"></script>
</body>
</html>
